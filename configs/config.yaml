server:
    host: localhost
    port: 8080
scrapers:
    user_agent: Javinizer (+https://github.com/javinizer/Javinizer)
    priority:
        - r18dev
        - dmm
    r18dev:
        enabled: true
    dmm:
        enabled: true
        scrape_actress: false
metadata:
    priority:
        actress:
            - dmm
            - r18dev
        alternate_title:
            - dmm
            - r18dev
        cover_url:
            - dmm
            - r18dev
        description:
            - dmm
            - r18dev
        director:
            - dmm
            - r18dev
        genre:
            - dmm
            - r18dev
        id:
            - dmm
            - r18dev
        content_id:
            - dmm
            - r18dev
        label:
            - dmm
            - r18dev
        maker:
            - dmm
            - r18dev
        rating:
            - dmm
            - r18dev
        release_date:
            - dmm
            - r18dev
        runtime:
            - dmm
            - r18dev
        series:
            - dmm
            - r18dev
        screenshot_url:
            - dmm
            - r18dev
        title:
            - dmm
            - r18dev
        trailer_url:
            - dmm
            - r18dev
    thumb_csv:
        enabled: true
        path: data/actress.csv
        auto_add: true
    genre_csv:
        enabled: true
        path: data/genres.csv
        auto_add: true
    ignore_genres: []
    required_fields: []
    nfo:
        enabled: true
        display_name: <TITLE>
        filename_template: <ID>.nfo
        first_name_order: true
        actress_language_ja: false
        unknown_actress_text: Unknown
        actress_as_tag: false
        include_stream_details: false
        include_fanart: true
        include_trailer: true
        rating_source: themoviedb
        tag: []
        tagline: ""
        credits: []
file_matching:
    extensions:
        - .mp4
        - .mkv
        - .avi
        - .wmv
        - .flv
    min_size_mb: 0
    exclude_patterns:
        - '*-trailer*'
        - '*-sample*'
    regex_enabled: false
    regex_pattern: ([a-zA-Z|tT28]+-\d+[zZ]?[eE]?)(?:-pt)?(\d{1,2})?
output:
    folder_format: <ID> [<STUDIO>] - <TITLE> (<YEAR>)
    file_format: <ID>
    subfolder_format: []
    delimiter: ', '
    download_cover: true
    download_poster: true
    download_extrafanart: true
    download_trailer: false
    download_actress: false
database:
    type: sqlite
    dsn: data/javinizer.db
logging:
    level: info
    format: text
    output: stdout
