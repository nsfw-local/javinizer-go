root = "."
tmp_dir = "tmp/air"

[build]
  cmd = "go build -o ./tmp/air/javinizer-dev ./cmd/javinizer"
  bin = "./tmp/air/javinizer-dev"
  full_bin = "./tmp/air/javinizer-dev api"
  include_dir = ["cmd", "internal", "configs"]
  include_file = ["go.mod", "go.sum", ".air.toml", "config.yaml"]
  include_ext = ["go", "yaml", "yml", "json", "toml"]
  exclude_dir = [
    ".git",
    "bin",
    "data",
    "internal/api/data",
    "internal/worker/data",
    "docs",
    "docs-no-commit",
    "logs",
    "out",
    "test-videos",
    "testdata",
    "tmp",
    "web",
  ]
  exclude_regex = ["_test.go"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
