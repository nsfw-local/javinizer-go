host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/javinizer/javinizer-go/issues
  description: REST API for JAV metadata scraping and file organization
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/javinizer/javinizer-go
  title: Javinizer API
  version: "1.0"
paths:
  /api/v1/actresses/search:
    get:
      description: Search for actresses by name (first, last, or Japanese)
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Actress'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Search actresses
      tags:
      - actress
  /api/v1/batch/{id}:
    get:
      description: Retrieve the status of a batch scraping job
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.BatchJobResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get batch job status
      tags:
      - web
  /api/v1/batch/{id}/cancel:
    post:
      description: Cancel a running batch scraping job
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Cancel batch job
      tags:
      - web
  /api/v1/batch/{id}/movies/{movieId}:
    patch:
      consumes:
      - application/json
      description: Update a movie's metadata within a batch job's results
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      - description: Movie ID
        in: path
        name: movieId
        required: true
        type: string
      - description: Updated movie data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateMovieRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.MovieResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Update movie in batch job
      tags:
      - web
  /api/v1/batch/{id}/movies/{movieId}/exclude:
    post:
      description: Mark a movie in a batch job as excluded from file organization
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: string
      - description: Movie ID
        in: path
        name: movieId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
