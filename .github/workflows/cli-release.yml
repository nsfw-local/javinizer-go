name: CLI Binary Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    # Midnight UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      release_type:
        description: Release mode
        required: true
        type: choice
        default: snapshot
        options:
          - stable
          - prerelease
          - snapshot
      version:
        description: Optional version/tag (e.g. v1.2.3 or v1.2.3-rc.1)
        required: false
        type: string
      create_release:
        description: Create or update GitHub release
        required: true
        type: boolean
        default: true
      draft:
        description: Mark release as draft (manual runs only)
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BINARY_NAME: javinizer
  GO_VERSION_FILE: go.mod

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tracked_version: ${{ steps.meta.outputs.tracked_version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft: ${{ steps.meta.outputs.draft }}
      create_release: ${{ steps.meta.outputs.create_release }}
      build_date: ${{ steps.meta.outputs.build_date }}
      commit: ${{ steps.meta.outputs.commit }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
      is_nightly: ${{ steps.meta.outputs.is_nightly }}
      nightly_date: ${{ steps.meta.outputs.nightly_date }}
      nightly_should_run: ${{ steps.meta.outputs.nightly_should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          commit="${GITHUB_SHA}"
          tracked_version="$(tr -d '[:space:]' < internal/version/version.txt)"
          nightly_should_run="true"

          if [[ -z "${tracked_version}" ]]; then
            echo "Tracked version file is empty" >&2
            exit 1
          fi

          if [[ "${event_name}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
            create_release="true"
            draft="false"
            publish_latest="true"
            is_nightly="false"
            nightly_date=""
            if [[ "${version}" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          elif [[ "${event_name}" == "schedule" ]]; then
            nightly_base="${tracked_version%%-*}"
            if [[ -z "${nightly_base}" ]]; then
              nightly_base="${tracked_version}"
            fi
            version="${nightly_base}-nightly.$(date -u '+%Y%m%d')"
            create_release="false"
            draft="false"
            prerelease="true"
            publish_latest="false"
            is_nightly="true"
            nightly_date="$(date -u '+%Y%m%d')"

            since_ts="$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')"
            changed_files="$(git log --since="${since_ts}" --name-only --pretty=format: -- . | sed '/^$/d' | sort -u)"
            relevant_pattern='^(cmd/|internal/|web/|Dockerfile$|go\.mod$|go\.sum$|Makefile$|internal/version/version\.txt$|\.github/workflows/cli-release\.yml$)'

            if [[ -z "${changed_files}" ]]; then
              nightly_should_run="false"
              echo "No repository changes detected in the last 24h; skipping nightly build."
            elif ! printf '%s\n' "${changed_files}" | grep -Eq "${relevant_pattern}"; then
              nightly_should_run="false"
              echo "No release-impacting changes detected in the last 24h; skipping nightly build."
            fi
          else
            release_type="${{ inputs.release_type }}"
            input_version="${{ inputs.version }}"
            create_release="${{ inputs.create_release }}"
            draft="${{ inputs.draft }}"
            is_nightly="false"
            nightly_date=""

            case "${release_type}" in
              stable)
                if [[ -z "${input_version}" ]]; then
                  echo "Stable releases require a version like v1.2.3" >&2
                  exit 1
                fi
                version="${input_version}"
                prerelease="false"
                publish_latest="true"
                ;;
              prerelease)
                if [[ -z "${input_version}" ]]; then
                  echo "Pre-releases require a version like v1.2.3-rc.1" >&2
                  exit 1
                fi
                version="${input_version}"
                prerelease="true"
                publish_latest="true"
                ;;
              snapshot)
                if [[ -n "${input_version}" ]]; then
                  version="${input_version}"
                else
                  version="v0.0.0-snapshot.$(date -u '+%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
                fi
                prerelease="true"
                publish_latest="false"
                ;;
              *)
                echo "Unknown release type: ${release_type}" >&2
                exit 1
                ;;
            esac

            if [[ "${release_type}" == "stable" && "${version}" == *-* ]]; then
              echo "Stable release version must not include prerelease suffix: ${version}" >&2
              exit 1
            fi
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version does not match expected format: ${version}" >&2
            exit 1
          fi

          if [[ "${event_name}" == "push" || "${release_type:-snapshot}" != "snapshot" ]]; then
            if [[ "${tracked_version}" != "${version}" ]]; then
              echo "Tracked version (${tracked_version}) does not match requested release version (${version})" >&2
              exit 1
            fi
          fi

          release_name="Javinizer ${version}"
          if [[ "${prerelease}" == "true" ]]; then
            release_name="${release_name} (Pre-release)"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tracked_version=${tracked_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "create_release=${create_release}" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date}" >> "$GITHUB_OUTPUT"
          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"
          echo "is_nightly=${is_nightly}" >> "$GITHUB_OUTPUT"
          echo "nightly_date=${nightly_date}" >> "$GITHUB_OUTPUT"
          echo "nightly_should_run=${nightly_should_run}" >> "$GITHUB_OUTPUT"

          echo "Resolved metadata:"
          echo "  version=${version}"
          echo "  prerelease=${prerelease}"
          echo "  draft=${draft}"
          echo "  create_release=${create_release}"
          echo "  publish_latest=${publish_latest}"
          echo "  is_nightly=${is_nightly}"
          echo "  nightly_should_run=${nightly_should_run}"

  build-web-assets:
    name: Build web assets
    needs: prepare-release
    if: needs.prepare-release.outputs.is_nightly != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix web/frontend

      - name: Build frontend bundle
        run: |
          npm run build --prefix web/frontend
          rm -rf web/dist
          mkdir -p web/dist
          cp -R web/frontend/build/. web/dist/

      - name: Upload web assets
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  build-linux:
    name: Build ${{ matrix.id }}
    needs: [prepare-release, build-web-assets]
    if: needs.prepare-release.outputs.is_nightly != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64
            build_deps: build-essential
            cc: ''
          - id: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_suffix: linux-arm64
            build_deps: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Download web assets
        uses: actions/download-artifact@v6
        with:
          name: web-dist
          path: .

      - name: Install build dependencies
        if: runner.os == 'Linux' && matrix.build_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.build_deps }}

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          output="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.artifact_suffix }}"

          go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${output}" ./cmd/javinizer

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.id }}
          path: dist/*

  build-darwin:
    name: Build darwin binaries
    needs: [prepare-release, build-web-assets]
    if: needs.prepare-release.outputs.is_nightly != 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Download web assets
        uses: actions/download-artifact@v6
        with:
          name: web-dist
          path: .

      - name: Build AMD64 and ARM64 binaries
        shell: bash
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          set -euo pipefail
          mkdir -p dist

          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${{ env.BINARY_NAME }}-${VERSION}-darwin-amd64" ./cmd/javinizer

          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-w -s \
            -X github.com/javinizer/javinizer-go/internal/version.Version=${VERSION} \
            -X github.com/javinizer/javinizer-go/internal/version.Commit=${COMMIT} \
            -X github.com/javinizer/javinizer-go/internal/version.BuildDate=${BUILD_DATE}" \
            -o "dist/${{ env.BINARY_NAME }}-${VERSION}-darwin-arm64" ./cmd/javinizer

      - name: Create universal binary
        shell: bash
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          lipo -create \
            "dist/${{ env.BINARY_NAME }}-${VERSION}-darwin-amd64" \
            "dist/${{ env.BINARY_NAME }}-${VERSION}-darwin-arm64" \
            -output "dist/${{ env.BINARY_NAME }}-${VERSION}-darwin-universal"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: darwin
          path: dist/*

  build-windows-amd64:
    name: Build windows-amd64
    needs: [prepare-release, build-web-assets]
    if: needs.prepare-release.outputs.is_nightly != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Download web assets
        uses: actions/download-artifact@v6
        with:
          name: web-dist
          path: .

      - name: Build binary
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.prepare-release.outputs.version }}
          COMMIT: ${{ needs.prepare-release.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare-release.outputs.build_date }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $output = "${{ env.BINARY_NAME }}-$env:VERSION-windows-amd64.exe"
          go build -trimpath -ldflags "-w -s -X github.com/javinizer/javinizer-go/internal/version.Version=$env:VERSION -X github.com/javinizer/javinizer-go/internal/version.Commit=$env:COMMIT -X github.com/javinizer/javinizer-go/internal/version.BuildDate=$env:BUILD_DATE" -o "dist/$output" ./cmd/javinizer

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-amd64
          path: dist/*

  build-docker:
    name: Build/push Docker image (GHCR)
    needs: prepare-release
    if: github.event_name != 'schedule' || needs.prepare-release.outputs.nightly_should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Derive stable semver tags
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          version='${{ needs.prepare-release.outputs.version }}'
          core="${version#v}"
          major=""
          minor=""

          if [[ "${version}" != *-* ]]; then
            IFS='.' read -r major minor _ <<< "${core}"
          fi

          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: needs.prepare-release.outputs.create_release == 'true' || needs.prepare-release.outputs.is_nightly == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare-release.outputs.publish_latest == 'true' }}
            type=raw,value=nightly,enable=${{ needs.prepare-release.outputs.is_nightly == 'true' }}
            type=raw,value=nightly-${{ needs.prepare-release.outputs.nightly_date }},enable=${{ needs.prepare-release.outputs.is_nightly == 'true' && needs.prepare-release.outputs.nightly_date != '' }}
            type=sha,format=short,prefix=sha-,enable=${{ needs.prepare-release.outputs.is_nightly == 'true' }}
            type=raw,value=v${{ steps.semver.outputs.major }},enable=${{ needs.prepare-release.outputs.prerelease != 'true' && steps.semver.outputs.major != '' }}
            type=raw,value=v${{ steps.semver.outputs.major }}.${{ steps.semver.outputs.minor }},enable=${{ needs.prepare-release.outputs.prerelease != 'true' && steps.semver.outputs.major != '' && steps.semver.outputs.minor != '' }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}

      - name: Build and (optionally) push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare-release.outputs.create_release == 'true' || needs.prepare-release.outputs.is_nightly == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.version }}
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}
            COMMIT=${{ needs.prepare-release.outputs.commit }}
            BUILD_DATE=${{ needs.prepare-release.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub release
    needs: [prepare-release, build-linux, build-darwin, build-windows-amd64, build-docker]
    if: needs.prepare-release.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v6
        with:
          name: linux-amd64
          path: ./artifacts/linux-amd64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v6
        with:
          name: linux-arm64
          path: ./artifacts/linux-arm64

      - name: Download darwin artifact
        uses: actions/download-artifact@v6
        with:
          name: darwin
          path: ./artifacts/darwin

      - name: Download windows-amd64 artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-amd64
          path: ./artifacts/windows-amd64

      - name: Consolidate release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release
          find ./artifacts -type f -exec cp {} ./release/ \;
          ls -lh ./release/

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd ./release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-bundle-${{ needs.prepare-release.outputs.version }}
          path: ./release/*

      - name: Publish GitHub release
        if: needs.prepare-release.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          files: ./release/*
          generate_release_notes: true
          draft: ${{ needs.prepare-release.outputs.draft == 'true' }}
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
