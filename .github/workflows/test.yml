name: Test & Coverage

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GO_VERSION_FILE: go.mod

permissions:
  contents: read
  id-token: write

jobs:
  # Job 1: Fast unit tests and coverage
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Detect act environment
      id: detect
      run: |
        if [ -n "$ACT" ]; then
          echo "running_in_act=true" >> $GITHUB_OUTPUT
          echo "Running in act (local testing mode)"
        else
          echo "running_in_act=false" >> $GITHUB_OUTPUT
          echo "Running in GitHub Actions"
        fi

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v ./...

    - name: Generate coverage report
      run: make coverage

    - name: Check coverage threshold
      run: ./scripts/check_coverage.sh 75 coverage.out

    - name: Upload coverage to Codecov
      if: steps.detect.outputs.running_in_act != 'true'
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        slug: javinizer/Javinizer-Go
        flags: unittests
        name: codecov-javinizer
        use_oidc: true
        fail_ci_if_error: true
        verbose: true

    - name: Archive coverage report
      if: steps.detect.outputs.running_in_act != 'true'
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 30

    - name: Display coverage report (act only)
      if: steps.detect.outputs.running_in_act == 'true'
      run: |
        echo "Coverage report generated (skipped upload in act mode)"
        go tool cover -func=coverage.out | tail -20

  # Job 2: Race detector tests (concurrent code)
  race-tests:
    name: Race Detector Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run race detector tests
      run: make test-race

  # Job 3: Linting and code quality
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Run go vet
      run: make vet

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        # Go 1.25 in go.mod requires a golangci-lint binary built with Go 1.25+.
        # v2.4.0+ satisfies this; pin to avoid v1 fallback from older action versions.
        version: v2.4.0
        args: --timeout=5m

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

  # Job 4: Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ env.GO_VERSION_FILE }}
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci --prefix web/frontend

    - name: Download dependencies
      run: go mod download

    - name: Build CLI
      run: make build

    - name: Verify binary
      run: |
        if [ ! -f bin/javinizer ]; then
          echo "Binary not created"
          exit 1
        fi
        chmod +x bin/javinizer
        ./bin/javinizer --version || echo "Version check completed"

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Resolve tracked version
      id: version
      run: |
        version="$(tr -d '[:space:]' < internal/version/version.txt)"
        if [ -z "$version" ]; then
          echo "Tracked version file is empty"
          exit 1
        fi
        echo "value=$version" >> "$GITHUB_OUTPUT"

    - name: Resolve build date
      id: build_date
      run: echo "value=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        load: true
        push: false
        tags: javinizer:test
        build-args: |
          VERSION=${{ steps.version.outputs.value }}
          COMMIT=${{ github.sha }}
          BUILD_DATE=${{ steps.build_date.outputs.value }}

    - name: Verify Docker metadata and version output
      run: |
        docker run --rm --entrypoint /usr/local/bin/javinizer javinizer:test version --short
        image_version="$(docker inspect javinizer:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
        if [ "$image_version" != "${{ steps.version.outputs.value }}" ]; then
          echo "Docker image label version mismatch: $image_version"
          exit 1
        fi
