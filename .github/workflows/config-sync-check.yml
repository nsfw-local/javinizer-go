name: Config Sync Check

on:
  push:
    branches: [main, master]
    paths:
      - 'configs/config.yaml.example'
      - 'internal/config/defaults.go'
      - 'internal/config/embed.go'
      - 'internal/scraper/**'
      - '.github/workflows/config-sync-check.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'configs/config.yaml.example'
      - 'internal/config/defaults.go'
      - 'internal/config/embed.go'
      - 'internal/scraper/**'
      - '.github/workflows/config-sync-check.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GO_VERSION_FILE: go.mod

jobs:
  config-sync:
    name: Validate Config Synchronization
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run config sync validation
        run: |
          chmod +x scripts/validate-config-sync.sh
          ./scripts/validate-config-sync.sh

      - name: Run drift detection test (verbose on failure)
        if: failure()
        run: |
          echo "=== Drift Detection Test Output ==="
          go test -v -run TestDefaultConfigMatchesExample ./internal/config/... || true
          echo ""
          echo "=== If you see failures above, fix the drift by: ==="
          echo "1. Update internal/config/defaults.go to match configs/config.yaml.example, OR"
          echo "2. Update configs/config.yaml.example to match internal/config/defaults.go"
          echo "3. Ensure both files represent the same default configuration state"
